  <!-- Left veins -->
  <path d="M251 205 C231 196, 204 199, 190 211" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M251 248 C226 238, 196 241, 179 255" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M252 291 C233 282, 208 285, 194 297" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Right veins -->
  <path d="M261 205 C281 196, 308 199, 322 211" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M261 248 C286 238, 316 241, 333 255" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <path d="M260 291 C279 282, 304 285, 318 297" stroke="#3DBE8F" stroke-width="6" stroke-linecap="round" fill="none"/>
  <!-- Stem -->
  <path d="M256 372 C253 386, 248 394, 244 406" stroke="url(#leaf)" stroke-width="10" stroke-linecap="round" fill="none"/>
