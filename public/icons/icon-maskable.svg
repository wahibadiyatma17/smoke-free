<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECFA0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A6B4E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8EFE0;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Full bleed background (no radius - required for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Icon content kept within safe zone (innermost 80% = 205px–307px) -->
  <!-- Leaf body - centered, scaled to fit safe zone -->
